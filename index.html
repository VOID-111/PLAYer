<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🎵 PLAYer</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background: #0b0b0f;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .app-container {
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: #0b0b0f;
            padding: 20px 16px 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0 14px 0;
            flex-shrink: 0;
            border-bottom: 1px solid #1a1a28;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .badge {
            background: #1a1a28;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 600;
            color: #a5a5c0;
            border: 1px solid #2a2a3a;
            white-space: nowrap;
        }

        .install-banner {
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            margin: 12px 0 12px;
            padding: 10px 16px;
            border-radius: 16px;
            display: none;
            align-items: center;
            justify-content: space-between;
            animation: fadeIn 0.3s;
            flex-shrink: 0;
        }

        .install-banner.show {
            display: flex;
        }

        .install-banner span {
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        .install-banner button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* upload */
        .upload-area {
            margin: 14px 0 14px;
            background: #14141e;
            border-radius: 20px;
            padding: 16px 18px 12px;
            border: 1px dashed #3a3a50;
            transition: 0.2s;
            flex-shrink: 0;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #818cf8;
            background: #1a1a2e;
        }

        .upload-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #c8c8e0;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
        }

        .upload-label input {
            display: none;
        }

        .upload-icon {
            font-size: 22px;
            line-height: 1;
        }

        .file-hint {
            font-size: 11px;
            color: #5f5f7a;
            text-align: center;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        /* playlist */
        .playlist {
            flex: 1;
            overflow-y: auto;
            margin: 12px 0 14px;
            padding-right: 4px;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }

        .playlist::-webkit-scrollbar {
            width: 3px;
        }

        .playlist::-webkit-scrollbar-track {
            background: transparent;
        }

        .playlist::-webkit-scrollbar-thumb {
            background: #3a3a50;
            border-radius: 10px;
        }

        .track-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: #14141e;
            border-radius: 16px;
            margin-bottom: 8px;
            border: 1px solid #1e1e30;
            transition: all 0.15s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .track-item:active {
            transform: scale(0.98);
        }

        .track-item.active {
            border-color: #818cf8;
            background: #1a1a32;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.08);
        }

        .track-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            min-width: 0;
        }

        .track-name {
            font-weight: 600;
            color: #e8e8f0;
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-size {
            font-size: 11px;
            color: #6a6a8a;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .track-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
            margin-left: 8px;
        }

        .track-actions button {
            background: transparent;
            border: none;
            color: #8a8aaa;
            font-size: 16px;
            width: 32px;
            height: 32px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            background: #1e1e30;
            -webkit-tap-highlight-color: transparent;
        }

        .track-actions button:active {
            transform: scale(0.9);
        }

        .track-actions .delete-btn:active {
            background: #4a2a3a;
            color: #ff7b89;
        }

        /* player */
        .player {
            background: #12121c;
            border-radius: 28px;
            padding: 14px 16px 18px;
            border: 1px solid #1e1e30;
            flex-shrink: 0;
        }

        .player-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .now-playing {
            flex: 1;
            min-width: 0;
        }

        .now-playing .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #5a5a7a;
        }

        .now-playing .track-title {
            font-weight: 600;
            color: #f0f0ff;
            font-size: 15px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .controls button {
            background: #1e1e30;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 20px;
            color: #c0c0dd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.12s;
            border: 1px solid #2a2a40;
            -webkit-tap-highlight-color: transparent;
        }

        .controls button:active {
            transform: scale(0.92);
        }

        .controls .play-btn {
            background: #4f46e5;
            color: white;
            border-color: #6366f1;
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.3);
            width: 48px;
            height: 48px;
            font-size: 26px;
        }

        .controls .play-btn:active {
            background: #4338ca;
            transform: scale(0.9);
        }

        .progress-area {
            margin-top: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: #1e1e30;
            border-radius: 10px;
            outline: none;
            transition: 0.1s;
        }

        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 20px;
            background: #818cf8;
            box-shadow: 0 0 20px #4f46e5;
            cursor: pointer;
            border: 2px solid #0b0b0f;
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #6a6a8a;
            margin-top: 4px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px 10px 20px;
            color: #5f5f7a;
        }

        .empty-state span {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            font-weight: 400;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            padding: 20px;
            color: #6a6a8a;
            font-size: 13px;
        }
        .loading-spinner.show {
            display: block;
        }

        @media (max-width: 460px) {
            .app-container {
                padding: 12px 12px 16px;
            }
            .controls button {
                width: 36px;
                height: 36px;
                font-size: 17px;
            }
            .controls .play-btn {
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
            .track-item {
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container" id="app">
        <!-- header -->
        <div class="header">
            <h1>🎧 PLAYer</h1>
            <span class="badge" id="trackCount">0 треков</span>
        </div>

        <!-- install banner -->
        <div class="install-banner" id="installBanner">
            <span>📲 Установить приложение</span>
            <button id="installBtn">Установить</button>
        </div>

        <!-- upload -->
        <div class="upload-area" id="uploadArea">
            <label class="upload-label" for="fileInput">
                <span class="upload-icon">⬇️</span>
                <span>Добавить аудио (mp3, wav, ogg)</span>
                <input type="file" id="fileInput" accept=".mp3,.wav,.ogg,.m4a,.aac" multiple>
            </label>
            <div class="file-hint">Файлы сохраняются в приложении</div>
        </div>

        <!-- playlist -->
        <div class="playlist" id="playlistContainer">
            <div class="empty-state" id="emptyState">
                <span>🎵</span>
                <p>Загрузите музыку, чтобы начать</p>
            </div>
        </div>

        <div class="loading-spinner" id="loadingSpinner">⏳ Загрузка треков...</div>

        <!-- player -->
        <div class="player" id="playerPanel">
            <div class="player-top">
                <div class="now-playing">
                    <div class="label">Сейчас играет</div>
                    <div class="track-title" id="currentTrackTitle">—</div>
                </div>
                <div class="controls">
                    <button id="prevBtn" aria-label="Предыдущий">⏮</button>
                    <button class="play-btn" id="playBtn" aria-label="Воспроизвести/пауза">▶</button>
                    <button id="nextBtn" aria-label="Следующий">⏭</button>
                </div>
            </div>
            <div class="progress-area">
                <input type="range" class="progress-bar" id="progressBar" value="0" min="0" max="100" step="0.1">
                <div class="time-labels">
                    <span id="currentTime">0:00</span>
                    <span id="totalTime">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
    (function() {
        "use strict";

        // === IDB helpers ===
        const DB_NAME = 'OfflineMusicDB';
        const STORE_NAME = 'tracks';
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        const store = db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        store.createIndex('name', 'name', { unique: false });
                    }
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function getAllTracks() {
            return new Promise((resolve, reject) => {
                if (!db) { reject('DB not open'); return; }
                const tx = db.transaction(STORE_NAME, 'readonly');
                const store = tx.objectStore(STORE_NAME);
                const request = store.getAll();
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject(request.error);
            });
        }

        function saveTrack(track) {
            return new Promise((resolve, reject) => {
                if (!db) { reject('DB not open'); return; }
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.add(track);
                request.onsuccess = () => resolve(track);
                request.onerror = () => reject(request.error);
            });
        }

        function deleteTrackFromDB(id) {
            return new Promise((resolve, reject) => {
                if (!db) { reject('DB not open'); return; }
                const tx = db.transaction(STORE_NAME, 'readwrite');
                const store = tx.objectStore(STORE_NAME);
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        // === state ===
        let playlist = [];
        let currentIndex = -1;
        let isPlaying = false;
        let audio = new Audio();
        let isLoading = false;

        // DOM
        const playlistEl = document.getElementById('playlistContainer');
        const emptyState = document.getElementById('emptyState');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const trackCountEl = document.getElementById('trackCount');
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');

        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const currentTrackTitle = document.getElementById('currentTrackTitle');

        const installBanner = document.getElementById('installBanner');
        const installBtn = document.getElementById('installBtn');

        // === helpers ===
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function getTrackNameFromFile(file) {
            return file.name.replace(/\.[^.]+$/, '');
        }

        // === render ===
        function renderPlaylist() {
            trackCountEl.textContent = playlist.length + ' треков';

            const items = playlistEl.querySelectorAll('.track-item');
            items.forEach(el => el.remove());

            if (playlist.length === 0) {
                emptyState.style.display = 'block';
                loadingSpinner.classList.remove('show');
                currentTrackTitle.textContent = '—';
                audio.src = '';
                isPlaying = false;
                playBtn.textContent = '▶';
                return;
            } else {
                emptyState.style.display = 'none';
                loadingSpinner.classList.remove('show');
            }

            playlist.forEach((track, idx) => {
                const div = document.createElement('div');
                div.className = 'track-item';
                if (idx === currentIndex) div.classList.add('active');

                const info = document.createElement('div');
                info.className = 'track-info';
                const nameSpan = document.createElement('div');
                nameSpan.className = 'track-name';
                nameSpan.textContent = track.name || 'Без названия';
                const sizeSpan = document.createElement('div');
                sizeSpan.className = 'track-size';
                sizeSpan.textContent = `📁 ${formatSize(track.size)}`;

                info.appendChild(nameSpan);
                info.appendChild(sizeSpan);

                const actions = document.createElement('div');
                actions.className = 'track-actions';

                const playBtnItem = document.createElement('button');
                playBtnItem.textContent = '▶';
                playBtnItem.setAttribute('aria-label', 'Воспроизвести');
                playBtnItem.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playTrack(idx);
                });

                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '✕';
                deleteBtn.className = 'delete-btn';
                deleteBtn.setAttribute('aria-label', 'Удалить');
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteTrack(idx);
                });

                actions.appendChild(playBtnItem);
                actions.appendChild(deleteBtn);

                div.appendChild(info);
                div.appendChild(actions);

                div.addEventListener('click', () => {
                    playTrack(idx);
                });

                playlistEl.appendChild(div);
            });

            if (currentIndex !== -1 && currentIndex < playlist.length) {
                currentTrackTitle.textContent = playlist[currentIndex].name || 'Без названия';
            } else if (playlist.length > 0 && currentIndex === -1) {
                currentTrackTitle.textContent = playlist[0].name || 'Без названия';
            }
        }

        // === track operations ===
        async function deleteTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            const trackId = playlist[index].id;

            if (index === currentIndex) {
                audio.pause();
                audio.src = '';
                isPlaying = false;
                playBtn.textContent = '▶';
                currentTrackTitle.textContent = '—';
                currentIndex = -1;
            } else if (index < currentIndex) {
                currentIndex--;
            }

            try {
                await deleteTrackFromDB(trackId);
                playlist.splice(index, 1);
                renderPlaylist();
                if (playlist.length === 0) {
                    currentTrackTitle.textContent = '—';
                    audio.src = '';
                } else if (currentIndex === -1 && playlist.length > 0) {
                    currentIndex = 0;
                    playTrack(0);
                }
            } catch (err) {
                console.error('Delete error:', err);
            }
        }

        function playTrack(index) {
            if (index < 0 || index >= playlist.length) return;
            const track = playlist[index];
            if (!track || !track.dataURL) return;

            audio.pause();
            audio.src = track.dataURL;
            audio.load();
            audio.play().catch(e => { /* ignore */ });

            currentIndex = index;
            isPlaying = true;
            playBtn.textContent = '⏸';
            currentTrackTitle.textContent = track.name || 'Без названия';
            renderPlaylist();

            audio.onloadedmetadata = function() {
                totalTimeEl.textContent = formatTime(audio.duration);
            };

            audio.ontimeupdate = function() {
                if (audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressBar.value = percent;
                    currentTimeEl.textContent = formatTime(audio.currentTime);
                }
            };

            audio.onended = function() {
                nextTrack();
            };
        }

        function togglePlay() {
            if (playlist.length === 0) return;
            if (currentIndex === -1) {
                currentIndex = 0;
                playTrack(0);
                return;
            }
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                playBtn.textContent = '▶';
            } else {
                audio.play().catch(() => {});
                isPlaying = true;
                playBtn.textContent = '⏸';
            }
        }

        function nextTrack() {
            if (playlist.length === 0) return;
            let idx = (currentIndex + 1) % playlist.length;
            if (idx === currentIndex) return;
            playTrack(idx);
        }

        function prevTrack() {
            if (playlist.length === 0) return;
            let idx = (currentIndex - 1 + playlist.length) % playlist.length;
            if (idx === currentIndex) return;
            playTrack(idx);
        }

        // === file handling ===
        async function handleFiles(files) {
            const fileArray = Array.from(files).filter(f => f.type.startsWith('audio/'));
            if (fileArray.length === 0) {
                alert('Пожалуйста, выберите аудиофайлы (mp3, wav, ogg и т.д.)');
                return;
            }

            isLoading = true;
            loadingSpinner.classList.add('show');

            for (const file of fileArray) {
                try {
                    const dataURL = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.onerror = (e) => reject(e.target.error);
                        reader.readAsDataURL(file);
                    });

                    const track = {
                        id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                        name: getTrackNameFromFile(file),
                        size: file.size,
                        dataURL: dataURL,
                        mimeType: file.type || 'audio/mpeg'
                    };

                    await saveTrack(track);
                    playlist.push(track);
                } catch (err) {
                    console.error('Ошибка загрузки файла:', err);
                }
            }

            isLoading = false;
            loadingSpinner.classList.remove('show');

            renderPlaylist();

            if (playlist.length > 0 && currentIndex === -1) {
                currentIndex = 0;
                playTrack(0);
            }

            fileInput.value = '';
        }

        // === load from DB ===
        async function loadPlaylistFromDB() {
            try {
                db = await openDB();
                const tracks = await getAllTracks();
                playlist = tracks;
                if (playlist.length > 0) {
                    currentIndex = 0;
                    renderPlaylist();
                } else {
                    renderPlaylist();
                }
            } catch (err) {
                console.error('DB load error:', err);
                renderPlaylist();
            }
        }

        // === PWA installation ===
        let deferredPrompt = null;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBanner.classList.add('show');
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                if (result.outcome === 'accepted') {
                    installBanner.classList.remove('show');
                }
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            installBanner.classList.remove('show');
        });

        // === event listeners ===
        fileInput.addEventListener('change', function(e) {
            if (this.files.length) {
                handleFiles(this.files);
            }
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFiles(e.dataTransfer.files);
            }
        });

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextTrack);
        prevBtn.addEventListener('click', prevTrack);

        progressBar.addEventListener('input', function() {
            if (audio.duration) {
                const val = this.value;
                audio.currentTime = (val / 100) * audio.duration;
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            }
        });

        // === init ===
        loadPlaylistFromDB();

        // === Service Worker ===
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/music/sw.js')
                .then(reg => console.log('✅ SW зарегистрирован:', reg))
                .catch(err => console.error('❌ Ошибка SW:', err));
        }
    })();
    </script>
</body>
</html>
